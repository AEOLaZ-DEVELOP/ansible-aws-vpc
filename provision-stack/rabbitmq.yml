# ---------- version ssm ----------
---
- name: Install & Setup RabbitMQ with user
  hosts: rmqsrvgrp
  become: yes
  gather_facts: no
  tasks:

    - name: Test connectivity over SSM
      ansible.builtin.ping:

    - name: Install Erlang repository package
      apt:
        deb: https://packages.erlang-solutions.com/erlang-solutions_1.0_all.deb
      tags:
        - package

    - name: Add Erlang Solution public key
      apt_key:
        url: https://packages.erlang-solutions.com/ubuntu/erlang_solutions.asc
        state: present
      tags:
        - package

    - name: Install Erlang
      apt:
        name: erlang
        update_cache: yes
        cache_valid_time: 86400
        state: present
      tags:
        - package

    - name: Add RabbitMQ apt signing key
      apt_key:
        url: https://github.com/rabbitmq/signing-keys/releases/download/2.0/rabbitmq-release-signing-key.asc
        state: present
      tags:
        - package

    - name: Add RabbitMQ repository
      apt_repository:
        repo: deb https://dl.bintray.com/rabbitmq/debian bionic main
        state: present
      tags:
        - package

    - name: Install RabbitMQ
      apt:
        name: rabbitmq-server
        state: present
        update_cache: yes
      tags:
        - package

    - name: Start & Enable RabbitMQ
      service:
        name: rabbitmq-server
        state: started
        enabled: yes
      tags:
        - svc

    - name: Configure RabbitMQ for remote login
      copy:
        content: |
          [{rabbit, [{loopback_users, []}]}].
        dest: /etc/rabbitmq/rabbitmq.config
      notify:
        - Restart RabbitMQ
      tags:
        - conf

    - name: Create RabbitMQ admin user
      rabbitmq_user:
        user: test
        password: test
        configure_priv: .*
        read_priv: .*
        write_priv: .*
        tags: administrator
        state: present
      notify:
        - Restart RabbitMQ
      tags:
        - conf

    - name: Enable rabbitmq_management plugin
      rabbitmq_plugin:
        names: rabbitmq_management
        state: enabled
      notify:
        - Restart RabbitMQ
      tags:
        - package

    - name: Verify RabbitMQ service is running
      service_facts:

    - name: Show RabbitMQ service state
      debug:
        msg: "rabbitmq-server state on {{ inventory_hostname }} = {{ ansible_facts.services['rabbitmq-server.service'].state | default('unknown') }}"

  handlers:

    - name: Restart RabbitMQ
      service:
        name: rabbitmq-server
        state: restarted