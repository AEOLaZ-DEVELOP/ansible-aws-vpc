# -------------- version ssm modern for DevSecOps --------------
---
- name: Setup Vprofile Stack
  hosts: localhost
  connection: local
  gather_facts: no
  vars:
    ssm_role_name: EC2-SSM-Role
    ssm_bucket_name: my-ansible-ssm-bucket 
  tasks:
    - name: Import VPC setup Variable
      include_vars: vars/vpc-output_vars
    - name: Import vprofile setup Variable
      include_vars: vars/vprostacksetup
    - name: Create vprofile ec2 key
      amazon.aws.ec2_key:
        name: vprofile-key
        region: "{{region}}"
      register: key_out
    - name: Save private key into file bastion-key.pem
      copy:
        content: "{{key_out.key.private_key}}"
        dest: "./bastion-key.pem"
        mode: 0600
      when: key_out.changed
    - name: Create Sec Grp for Load Balancer
      amazon.aws.ec2_security_group:
        name:  vproELB-sg
        description:  Allow port 80 from everywhere and all port within sg
        region: "{{region}}"
        vpc_id: "{{vpcid}}"
        rules:
          - proto: tcp
            from_port: 80
            to_port: 80
            cidr_ip: 0.0.0.0/0
          - proto: tcp
            from_port: 8080
            to_port: 8080
            cidr_ip: 0.0.0.0/0
      register: vproELBSG_out
    - name: Create Securiry Group for Vprofile Stack
      amazon.aws.ec2_security_group:
        name: vproStack-sg
        description: Allow port 22 from everywhere and all port within sg
        region: "{{region}}"
        vpc_id: "{{vpcid}}"
        purge_rules: no
        rules:
          - proto: tcp
            from_port: 80
            to_port: 80
            group_id: "{{vproELBSG_out.group_id}}"
          - proto: tcp
            from_port: 8080
            to_port: 8080
            group_id: "{{vproELBSG_out.group_id}}"
        #  - proto: tcp
        #    from_port: 22
        #    to_port: 22
        #    group_id: "{{BastionSGid}}"
      register: vproStackSG_out
    - name: Update Securiry Group with its own sg id
      amazon.aws.ec2_security_group:
        name: vproStack-sg
        description: Allow port 22 from everywhere and all port within sg
        region: "{{region}}"
        vpc_id: "{{vpcid}}"
        purge_rules: no
        rules:
          - proto: all
            group_id: "{{vproStackSG_out.group_id}}"
    # - name: Creating Nginx web01
      # amazon.aws.ec2_instance:
      #   key_name: vprofile-key
      #   region: "{{region}}"
      #   instance_type: t3.micro
      #   image_id: "{{nginx_ami}}"
      #   wait: yes
      #   wait_timeout: 300
      #   tags:
      #     Name: "web01"
      #     Project: Vprofile
      #     Owner: DevOps Team
      #   security_groups: 
      #     - "{{vproStackSG_out.group_id}}"
      #   subnet_id: "{{privsub1id}}"
      #   iam_instance_profile: "{{ ssm_role_name }}"             
      #   user_data: |
      #     #!/bin/bash
      #       snap install amazon-ssm-agent --classic || true
      #       systemctl enable amazon-ssm-agent || true
      #       systemctl start amazon-ssm-agent || true
      #       systemctl restart amazon-ssm-agent || true
      #   register: web01_out
    # - name: Show web01 details
      # debug:
      #   msg:
      #     - "web01 instance id: {{ web01_out.instances[0].instance_id }}"
      #     - "web0101 private ip: {{ web01_out.instances[0].private_ip_address }}"
      #     - "IAM profile: {{ ssm_role_name }}"
    - name: Creating tomcat app01
      amazon.aws.ec2_instance:
        key_name: vprofile-key
        region: "{{region}}"
        instance_type: t3.micro
        image_id: "{{tomcat_ami}}"
        wait: yes
        wait_timeout: 300
        tags:
          Name: "app01"
          Project: Vprofile
          Owner: DevOps Team
        security_groups: 
          - "{{vproStackSG_out.group_id}}"
        subnet_id: "{{privsub1id}}"
        iam_instance_profile: "{{ ssm_role_name }}"             
        user_data: |
            #!/bin/bash
              snap install amazon-ssm-agent --classic || true
              systemctl enable amazon-ssm-agent || true
              systemctl start amazon-ssm-agent || true
              systemctl restart amazon-ssm-agent || true
      register: app01_out
    - name: Show app01 details
      debug:
        msg:
          - "app01 instance id: {{ app01_out.instances[0].instance_id }}"
          - "app01 private ip: {{ app01_out.instances[0].private_ip_address }}"
          - "IAM profile: {{ ssm_role_name }}"
    - name: Creating memcache mc01
      amazon.aws.ec2_instance:
        key_name: vprofile-key
        region: "{{region}}"
        instance_type: t3.micro
        image_id: "{{memcache_ami}}"
        wait: yes
        wait_timeout: 300
        tags:
          Name: "mc01"
          Project: Vprofile
          Owner: DevOps Team
        security_groups: 
          - "{{vproStackSG_out.group_id}}"
        subnet_id: "{{privsub1id}}"
        iam_instance_profile: "{{ ssm_role_name }}"             
        user_data: |
          #!/bin/bash
            snap install amazon-ssm-agent --classic || true
            systemctl enable amazon-ssm-agent || true
            systemctl start amazon-ssm-agent || true
            systemctl restart amazon-ssm-agent || true
      register: mc01_out
    - name: Show mc01 details
      debug:
        msg:
          - "mc01 instance id: {{ mc01_out.instances[0].instance_id }}"
          - "mc01 private ip: {{ mc01_out.instances[0].private_ip_address }}"
          - "IAM profile: {{ ssm_role_name }}"   
    - name: Creating RabbitMQ rmq01
      amazon.aws.ec2_instance:
        key_name: vprofile-key
        region: "{{region}}"
        instance_type: t3.micro
        image_id: "{{rmq_ami}}"
        wait: yes
        wait_timeout: 300
        tags:
          Name: "rmq01"
          Project: Vprofile
          Owner: DevOps Team
        security_groups: 
          - "{{vproStackSG_out.group_id}}"
        subnet_id: "{{privsub1id}}"
        iam_instance_profile: "{{ ssm_role_name }}"             
        user_data: |
          #!/bin/bash
            snap install amazon-ssm-agent --classic || true
            systemctl enable amazon-ssm-agent || true
            systemctl start amazon-ssm-agent || true
            systemctl restart amazon-ssm-agent || true
      register: rmq01_out
    - name: Show rmq01 details
      debug:
        msg:
          - "rmq01 instance id: {{ rmq01_out.instances[0].instance_id }}"
          - "rmq01 private ip: {{ rmq01_out.instances[0].private_ip_address }}"
          - "IAM profile: {{ ssm_role_name }}"   
    - name: Creating Mysql db01
      amazon.aws.ec2_instance:
        key_name: vprofile-key
        region: "{{region}}"
        instance_type: t3.micro
        image_id: "{{mysql_ami}}"
        wait: yes
        wait_timeout: 300
        tags:
          Name: "db01"
          Project: Vprofile
          Owner: DevOps Team
        security_groups: 
          - "{{vproStackSG_out.group_id}}"
        subnet_id: "{{privsub1id}}"
        iam_instance_profile: "{{ ssm_role_name }}"             
        user_data: |
          #!/bin/bash
            snap install amazon-ssm-agent --classic || true
            systemctl enable amazon-ssm-agent || true
            systemctl start amazon-ssm-agent || true
            systemctl restart amazon-ssm-agent || true
      register: db01_out
    - name: Show db01 details
      debug:
        msg:
          - "db01 instance id: {{ db01_out.instances[0].instance_id }}"
          - "db01 private ip: {{ db01_out.instances[0].private_ip_address }}"
          - "IAM profile: {{ ssm_role_name }}"  
    - debug:
        var: db01_out.instances[0].instance_id
    - local_action:
        module: ec2_elb_lb
        name: "vprofile-elb"
        region: "{{region}}"
        state: present
        instance_ids:
          - "{{ app01_out.instances[0].instance_id }}"
        purge_instance_ids: true
        security_group_ids: 
          - "{{ vproELBSG_out.group_id }}"
        subnets:
          - "{{ pubsub1id }}"
          - "{{ pubsub2id }}"
          - "{{ pubsub3id }}"
        listeners:
          - protocol: http # options are http, https, ssl, tcp
            load_balancer_port: 80
            instance_port: 80
        listeners:
          - protocol: http # options are http, https, ssl, tcp
            load_balancer_port: 8080
            instance_port: 8080
    - name: Insert/Update Hosts IP & Name in file provision-stack/group_vars/hostsip
      blockinfile:
        path: provision-stack/group_vars/hostsip
        block: |
          app01_ip: {{ app01_out.instances[0].private_ip_address }}
          rmq01_ip: {{ rmq01_out.instances[0].private_ip_address }}
          mc01_ip: {{ mc01_out.instances[0].private_ip_address }}
          db01_ip: {{ db01_out.instances[0].private_ip_address }}
        # web01_ip: {{ web01_out.instances[0].private_ip_address }}
      register: hostsfile_out
    - name: Debug file update result
      debug:
        var: hostsfile_out
    - name: Copy login key to provision_stack directory
      copy:
        src: bastion-key.pem
        dest: provision-stack/loginkey_vpro.pem
        mode: '0400'
    - name: Create temporary S3 bucket for Ansible over SSM
      amazon.aws.s3_bucket:                                          
          name: "{{ ssm_bucket_name }}"
          state: present
          region: "{{ aws_region }}"
    - name: Insert/Update Inventory file provision-stack/inventory-vpro
      blockinfile:
        path: provision-stack/inventory-vpro
        block: |
          [appsrvgrp]
          app01 ansible_host={{ app01_out.instances[0].instance_id }}

          [rmqsrvgrp]
          rmq01 ansible_host={{ rmq01_out.instances[0].instance_id }}

          [mcsvrgrp]
          mc01 ansible_host={{ mc01_out.instances[0].instance_id }}

          [dbsrvgrp]
          db01 ansible_host={{ db01_out.instances[0].instance_id }}        
                  
          [stack_inst:children]
          appsrvgrp                                               
          rmqsrvgrp                                               
          mcsvrgrp                                                
          dbsrvgrp                                                

          [stack_inst:vars]
          ansible_connection=amazon.aws.aws_ssm                   
          ansible_aws_ssm_region={{ aws_region }}                 
          ansible_aws_ssm_bucket_name={{ ssm_bucket_name }}       
          ansible_user=ssm-user                                   
          ansible_become=true                                     
          ansible_become_method=sudo        

       