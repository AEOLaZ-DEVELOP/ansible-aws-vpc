# ---------- version ssm ----------
---
- name: Setup Nginx svc
  hosts: websrvgrp
  become: yes
  gather_facts: no

  tasks:

    - name: Test connectivity over SSM
      ansible.builtin.ping:

    - name: Install nginx
      apt:
        name: nginx
        state: present
        update_cache: yes
        cache_valid_time: 86400
      tags:
        - package

    - name: Start & Enable Nginx
      service:
        name: nginx
        state: started
        enabled: yes
      tags:
        - svc

    - name: Disable Nginx default website
      file:
        path: /etc/nginx/sites-enabled/default
        state: absent
      tags:
        - conf

    - name: Deploy web config file
      template:
        src: templates/nginxvpro.j2
        dest: /etc/nginx/sites-available/vproapp
      tags:
        - conf

    - name: Enable vproapp website
      file:
        src: /etc/nginx/sites-available/vproapp
        dest: /etc/nginx/sites-enabled/vproapp
        state: link
      notify:
        - Restart Nginx
      tags:
        - conf

    - name: Verify nginx service is running
      service_facts:

    - name: Show nginx service state
      debug:
        msg: "nginx state on {{ inventory_hostname }} = {{ ansible_facts.services['nginx.service'].state | default('unknown') }}"

  handlers:
    - name: Restart Nginx
      service:
        name: nginx
        state: restarted